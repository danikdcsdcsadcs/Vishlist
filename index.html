<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Общий Вишлист</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="login-card">
            <h1>Добро пожаловать!</h1>
            <p>Войдите или придумайте логин для регистрации</p>
            <form id="login-form">
                <input type="text" id="username-input" placeholder="Логин (любые символы)" required autocomplete="off">
                <input type="password" id="password-input" placeholder="Пароль" required autocomplete="off">
                <button type="submit" class="btn-primary">Войти / Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <div id="rooms-screen" class="screen">
        <header class="app-header">
            <div class="header-main">
                <div class="user-profile">
                    <img id="user-avatar" class="avatar" src="" alt="Аватар">
                    <div class="user-greeting">Привет, <span id="rooms-user-display" class="user-badge"></span>!</div>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle-rooms" class="btn-icon" title="Сменить тему">🌓</button>
                    <button id="logout-btn" class="btn-secondary">Выйти</button>
                </div>
            </div>
            <div class="app-branding">
                <h1>🏠 Ваши комнаты</h1>
            </div>
            
            <div class="admin-panel rooms-actions-grid" style="border-top: none;">
                <form id="create-room-form">
                    <input type="text" id="room-name-input" placeholder="Название новой комнаты..." required autocomplete="off">
                    <button type="submit" class="btn-primary">Создать</button>
                </form>
                <form id="join-room-form">
                    <input type="text" id="room-id-input" placeholder="Вставьте код (ID)..." required autocomplete="off">
                    <button type="submit" class="btn-secondary">Войти по коду</button>
                </form>
            </div>
        </header>

        <main class="app-main">
            <div id="rooms-container" class="gifts-grid">
                <div class="loading-placeholder">Загрузка комнат...</div>
            </div>
        </main>
    </div>

    <div id="app-screen" class="screen">
        <header class="app-header">
            <div class="header-main">
                <button id="back-to-rooms-btn" class="btn-secondary">← К комнатам</button>
                <div class="header-actions">
                    <button id="toggle-chat-btn" class="btn-primary">💬 Чат</button>
                    <button id="theme-toggle-app" class="btn-icon" title="Сменить тему">🌓</button>
                </div>
            </div>
            
            <div class="app-branding">
                <h1>🎁 <span id="current-room-name">...</span></h1>
                <div class="room-id-display">
                    Код для приглашения: <code id="current-room-id" title="Нажми, чтобы скопировать">...</code>
                </div>
                <div class="stats-counter">
                    👥 Участников: <strong id="room-users-count">0</strong> | 
                    🎁 Подарков: <strong id="total-count">0</strong>
                </div>
                
                <button id="start-santa-btn" class="btn-secondary" style="display: none; margin: 10px auto;">🎲 Запустить Тайного Санту</button>
                <div id="secret-santa-banner" class="secret-santa-banner" style="display: none;">
                    🎅 Тайный Санта: вы дарите подарок пользователю <strong id="santa-target">...</strong>! 🤫
                </div>
            </div>

            <div class="admin-panel">
                <form id="add-gift-form">
                    <div class="form-grid">
                        <input type="text" id="gift-title-input" placeholder="Название подарка*" required autocomplete="off">
                        <input type="number" id="gift-price-input" placeholder="Цена (₽)*" required min="0" autocomplete="off">
                        <input type="url" id="gift-image-input" placeholder="Ссылка на фото" autocomplete="off">
                    </div>
                    
                    <div class="rating-input-container">
                        <span class="rating-label">Насколько нужно:</span>
                        <div class="star-rating">
                            <input type="radio" id="star5" name="rating" value="5"><label for="star5" title="Жизненно необходимо">★</label>
                            <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="Очень хочу">★</label>
                            <input type="radio" id="star3" name="rating" value="3" checked><label for="star3" title="Было бы неплохо">★</label>
                            <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="Не горит">★</label>
                            <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="Просто прикольно">★</label>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary btn-block">Добавить в вишлист</button>
                </form>
            </div>
        </header>

        <main class="app-main room-layout">
            <div class="gifts-section">
                <div class="filter-bar">
                    <input type="text" id="search-input" placeholder="🔍 Поиск...">
                    
                    <select id="user-filter-select" class="sort-select">
                        <option value="all">👥 Все участники</option>
                        </select>

                    <select id="sort-select" class="sort-select">
                        <option value="default">Сортировка: По умолчанию</option>
                        <option value="rating-desc">⭐ Сначала важные</option>
                        <option value="price-asc">🪙 Сначала дешевле</option>
                        <option value="price-desc">💎 Сначала дороже</option>
                    </select>
                </div>
                <div id="gifts-container" class="gifts-grid">
                    </div>
            </div>

            <aside id="chat-panel" class="chat-sidebar">
                <div class="chat-header">
                    <h3>💬 Чат комнаты</h3>
                    <button id="close-chat-btn" class="btn-icon mobile-only">✖</button>
                </div>
                <div id="chat-messages" class="chat-messages">
                    </div>
                <form id="chat-form" class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Сообщение..." required autocomplete="off">
                    <button type="submit" class="btn-primary">➤</button>
                </form>
            </aside>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
