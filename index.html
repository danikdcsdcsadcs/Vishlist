<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Общий Вишлист</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="login-card">
            <h1>Добро пожаловать!</h1>
            <p>Введите своё имя для входа в вишлист</p>
            <form id="login-form">
                <input type="text" id="username-input" placeholder="Ваше имя" required autocomplete="off" maxlength="20">
                <button type="submit" class="btn-primary">Войти</button>
            </form>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <header class="app-header">
            <div class="header-main">
                <div class="user-greeting">
                    Привет, <span id="current-user-display" class="user-badge">Гость</span>!
                </div>
                <div class="header-actions">
                    <button id="theme-toggle" class="btn-icon" title="Переключить тему">🌓</button>
                    <button id="logout-btn" class="btn-secondary">Выйти</button>
                </div>
            </div>
            
            <div class="app-branding">
                <h1>🎁 Наш Вишлист</h1>
                <div id="stats-counter" class="stats-counter">
                    Всего подарков: <strong id="total-count">0</strong> | Отмечено вами: <strong id="user-count">0</strong>
                </div>
            </div>

            <div class="filter-bar">
                <input type="text" id="search-input" placeholder="🔍 Поиск подарка...">
                <select id="sort-select" class="sort-select">
                    <option value="default">Сортировка: Сначала нужные</option>
                    <option value="price-asc">Цена: по возрастанию</option>
                    <option value="price-desc">Цена: по убыванию</option>
                    <option value="title-asc">Название: А-Я</option>
                    <option value="author-asc">Кто создал: А-Я</option>
                </select>
            </div>

            <div id="admin-panel" class="admin-panel">
                <form id="add-gift-form">
                    <div class="form-grid">
                        <input type="text" id="gift-title-input" placeholder="Название подарка*" required autocomplete="off">
                        <input type="number" id="gift-price-input" placeholder="Цена (₽)*" required min="0" autocomplete="off">
                        <input type="url" id="gift-image-input" placeholder="Ссылка на фото (https://...)" autocomplete="off">
                    </div>
                    <button type="submit" class="btn-primary btn-block">Добавить в вишлист</button>
                </form>
            </div>
        </header>

        <main class="app-main">
            <div id="gifts-container" class="gifts-grid">
                <div class="loading-placeholder">Загрузка подарков...</div>
            </div>
        </main>

        <footer class="app-footer">
            <p>&copy; 2026 Сделано с ❤️ | <a href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub Project</a></p>
        </footer>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
